name: Deploy Infra

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "202[3-9].[0-9][0-9].[0-9]+-rc[0-9]+"
      - "202[3-9].[0-9][0-9].[0-9]+"

concurrency:
  group: ${{ github.ref_type != 'tag' && github.ref_name || contains(github.ref, '-rc') && 'test' || 'prod' }}
  cancel-in-progress: false # Set to true to cancel old runs for new ones

permissions:
  id-token: write
  contents: read

jobs:
  create-infra:
    runs-on: ubuntu-latest
    # Selects 'test' for -rc tags, 'prod' for regular tags, or branch name otherwise
    environment: ${{ github.ref_type != 'tag' && github.ref_name || contains(github.ref, '-rc') && 'test' || 'prod' }}
    
    defaults:
      run:
        working-directory: infra/terraform

    steps:
    - name: Check out the repository
      uses: actions/checkout@v4
    
    - name: Log in to Azure using Federated Credentials
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_MI_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_MI_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_MI_SUBSCRIPTION_ID }}
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="key=${{ github.ref_type != 'tag' && 'dev' || contains(github.ref, '-rc') && 'test' || 'prod' }}.terraform.tfstate"

    - name: Terraform Plan
      run: |
        terraform plan \
          -var "container_tag=4c223c07fb3f2bd45ce55a8af9ad6922af368ece" \
          -var "subscription_id=${{ secrets.AZURE_MI_SUBSCRIPTION_ID }}" \
          -var "env_suffix=${{ vars.RG }}"
          -out=tfplan
    
    - name: Terraform Apply
      run: |
        terraform apply -auto-approve tfplan